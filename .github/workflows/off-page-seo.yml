name: "🌐 Off-Page SEO Auto-Distributor"

on:
  # Fires automatically after the DAILY AI blog generator completes
  workflow_run:
    workflows: ["🤖 Daily AI Blog Auto-Publisher"]
    types:
      - completed

  # Also allows manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual posts)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  distribute:
    name: Distribute to All Social Platforms
    runs-on: ubuntu-latest

    # Only run if blog generation succeeded (or manual trigger)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pull latest — blog was just committed by ai-blog-generator
          fetch-depth: 1

      - name: "🔧 Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "📦 Install Dependencies"
        run: npm ci

      - name: "🚀 Run Off-Page SEO Distribution Engine"
        env:
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN:      ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:        ${{ secrets.LINKEDIN_PERSON_URN }}
          TWITTER_API_KEY:            ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:         ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:       ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:      ${{ secrets.TWITTER_ACCESS_SECRET }}
          MEDIUM_INTEGRATION_TOKEN:   ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
          DEV_TO_API_KEY:             ${{ secrets.DEV_TO_API_KEY }}
          REDDIT_CLIENT_ID:           ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:       ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:            ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:            ${{ secrets.REDDIT_PASSWORD }}
          PINTEREST_ACCESS_TOKEN:     ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:         ${{ secrets.PINTEREST_BOARD_ID }}
        run: |
          DRY=${{ github.event.inputs.dry_run || 'false' }}
          if [ "$DRY" = "true" ]; then
            node social-engine.js --dry-run
          else
            node social-engine.js
          fi

      - name: "📊 Commit Distribution Log"
        run: |
          git config --global user.name  "SEO Distribution Bot"
          git config --global user.email "seo-bot@tirtheshjain.com"
          git add distribution-log.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📊 Distribution log: $(date '+%Y-%m-%d %H:%M UTC')" && git push
