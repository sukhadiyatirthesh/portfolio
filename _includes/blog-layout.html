<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} | Tirthesh Jain Blog</title>
  <meta name="description" content="{{ description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Adjusted path for styles if in subfolder -->
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .blog-post { max-width: 800px; margin: 120px auto 60px; padding: 20px; color: var(--text); }
    .blog-post h1 { font-size: 2.5rem; margin-bottom: 20px; color: var(--text-dark); }
    .blog-post h2 { margin-top: 40px; margin-bottom: 15px; color: var(--primary); }
    .blog-post p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.1rem; }
    .blog-post ul, .blog-post ol { margin-bottom: 1.5rem; padding-left: 20px; }
    .blog-post li { margin-bottom: 0.5rem; }
    .blog-post strong { color: var(--text-dark); }
    .blog-post blockquote { border-left: 4px solid var(--primary); padding-left: 15px; font-style: italic; opacity: 0.8; }
  </style>
  <!-- Google tag (gtag.js) - Placeholder for Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body>
  <!-- NAVIGATION -->
  <nav class="nav" id="nav" role="navigation" style="background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);">
    <div class="nav-inner">
      <a href="/" class="nav-logo" aria-label="Tirthesh Jain - Home">
        <span class="logo-mark">TJ</span>
        <span class="logo-text">Tirthesh Jain</span>
      </a>
      <ul class="nav-links" id="nav-links" role="list">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/blog/" class="nav-link">Blog</a></li>
      </ul>
      <a href="https://docs.google.com/document/d/15hKMsemaUUqs38FSSEMup4_uXtCcy_0T/export?format=pdf" target="_blank" class="btn btn-primary btn-sm nav-cta">
        📄 Resume
      </a>
    </div>
  </nav>

  <main class="blog-post">
    <h1>{{ title }}</h1>
    <p style="opacity: 0.6; font-size: 0.9rem;">Published on: {{ date | date: "%Y-%m-%d" }}</p>
    <hr style="margin: 20px 0; border: 1px solid rgba(0,0,0,0.1);">
    
    {{ content }}
    
  </main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-left">
        <a href="/" class="footer-logo">
          <span class="logo-mark">TJ</span>
          <span>Tirthesh Jain</span>
        </a>
        <p class="footer-tagline">Performance Marketer | Paid Media Specialist | Growth Marketer</p>
      </div>
      <div class="footer-center">
        <nav aria-label="Footer navigation">
          <ul class="footer-nav" role="list">
            <li><a href="/">Home</a></li>
          </ul>
        </nav>
      </div>
      <div class="footer-right">
        <a href="https://www.linkedin.com/in/tirthesh-jain-a5136a274" target="_blank" class="footer-social">LinkedIn</a>
        <a href="mailto:sukhadiyatirthesh5@gmail.com" class="footer-social">Email</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2025 Tirthesh Jain. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
